[phases.setup]
nixPkgs = ["python3", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && python -m pip install --upgrade pip setuptools wheel",
  ". /opt/venv/bin/activate && python -m pip install --index-url https://pypi.org/simple -r requirements.txt"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
